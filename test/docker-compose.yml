services:
  agent-api-server:
      build: ./
      ports:
         - "3000:3000"
      environment:
         - PORT=3000
         - SERVER_ID=api-server-01
         - SERVER_LABEL=API Server
         - REDIS_URL=redis://central-backend:6379
         - AGENT_SECRET=secret123     
  agent-db-server:
        build: ./
        ports:
          - "4000:4000"
        environment:
          - PORT=4000
          - SERVER_ID=db-server-01
          - SERVER_LABEL=Database Server
          - REDIS_URL=redis://central-backend:6379
          - AGENT_SECRET=secret456
  agent-worker:
        build: ./
        ports:
          - "5000:5000"
        environment:
          - PORT=5000
          - SERVER_ID=worker-01
          - SERVER_LABEL=Worker Node
          - REDIS_URL=redis://central-backend:6379
          - AGENT_SECRET=secret789